<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Fallback Solar Image</title>
  <desc id="desc">Stylized solar panel and sun illustration used as fallback image.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102340" />
      <stop offset="100%" stop-color="#1f3d67" />
    </linearGradient>
    <linearGradient id="sunGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbd35d" />
      <stop offset="100%" stop-color="#e4a620" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)" />
  <circle cx="930" cy="170" r="90" fill="url(#sunGlow)" opacity="0.95" />
  <g opacity="0.25" stroke="#f9c347" stroke-width="8">
    <line x1="930" y1="20" x2="930" y2="0" />
    <line x1="930" y1="340" x2="930" y2="320" />
    <line x1="780" y1="170" x2="760" y2="170" />
    <line x1="1100" y1="170" x2="1120" y2="170" />
  </g>
  <g transform="translate(170 430)">
    <polygon points="0 190 820 190 720 0 100 0" fill="#0f223e" />
    <g stroke="#436189" stroke-width="6">
      <line x1="60" y1="40" x2="760" y2="40" />
      <line x1="40" y1="90" x2="780" y2="90" />
      <line x1="20" y1="140" x2="800" y2="140" />
      <line x1="150" y1="0" x2="80" y2="190" />
      <line x1="300" y1="0" x2="240" y2="190" />
      <line x1="450" y1="0" x2="400" y2="190" />
      <line x1="600" y1="0" x2="560" y2="190" />
    </g>
  </g>
  <text x="80" y="120" font-family="Inter, Arial, sans-serif" font-size="52" fill="#fbd35d" letter-spacing="2">
    SIRAJSOLAR
  </text>
  <text x="82" y="170" font-family="Inter, Arial, sans-serif" font-size="24" fill="#d7e3f5" letter-spacing="1">
    IMAGE UNAVAILABLE - USING FALLBACK
  </text>
</svg>
